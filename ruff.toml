line-length = 88
indent-width = 4
exclude = ["build/", "dist/", ".venv/", "*/migrations/*"]

[lint]
# E - PEP 8 style errors (e.g., line too long, missing whitespace, etc.)
# F - Pyflakes checks for logical errors (e.g., undefined variables, unused imports, etc.)
# W - PEP 8 style warnings (e.g., trailing whitespace, no newline at end of file, etc.)
# I - Import sorting rules (e.g., organizing imports into sections, alphabetizing them)
select = ["E", "F", "W", "I"]
ignore = ["E501"]
